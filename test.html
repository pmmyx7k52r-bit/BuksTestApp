<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeinMarkt 1.3</title>

<style>
body { font-family: monospace; background:#080c14; color:#bdd0ee; padding:16px;}
button { padding:14px; width:100%; background:#0d1e42; color:#fff; border:none; border-radius:10px;}
.card { background:#0d1220; padding:12px; margin-top:10px; border-radius:8px;}
.spinner { width:16px;height:16px;border:2px solid #333;border-top:2px solid #5ba3ff;border-radius:50%;display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin {to{transform:rotate(360deg)}}
.small { font-size:12px; color:#6a8aae;}
</style>
</head>

<body>

<h2>📊 MeinMarkt 1.3 (€)</h2>

<button id="scanBtn" onclick="startScan()">
<span id="btnText">Scan starten</span>
<span id="btnIcon">→</span>
</button>

<div id="status" class="small"></div>
<div id="progress" class="small"></div>
<div id="output"></div>

<script>
const FINNHUB = "DEIN_FINNHUB_KEY"
const CLAUDE = "DEIN_CLAUDE_KEY"

const WATCHLIST = [
"PLTR","SOFI","UPST","RIVN","COIN","AFRM","MARA","RIOT",
"AI","IONQ","LCID","DKNG","HOOD","QS","BB","NIO"
];

// ── EUR Conversion ─────────────────────────
async function getEURRate(){
const r = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=EUR");
const d = await r.json();
return d.rates.EUR;
}

// ── Quote ─────────────────────────
async function getQuote(t){
const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FINNHUB}`);
return await r.json();
}

// ── News ─────────────────────────
async function getNews(t){
try{
const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${t}&from=2024-01-01&to=2026-01-01&token=${FINNHUB}`);
const d = await r.json();
return d.length;
}catch{
return 0;
}
}

// ── Prefilter + Scoring ─────────────────────────
async function prefilter(){

let results = [];

for(let i=0;i<WATCHLIST.length;i++){

document.getElementById("progress").innerText =
`Scanne ${i+1} / ${WATCHLIST.length}`;

try{
let q = await getQuote(WATCHLIST[i]);
let newsCount = await getNews(WATCHLIST[i]);

let score = 0;

// Momentum
score += q.dp;

// News Boost
if(newsCount > 5) score += 3;
if(newsCount > 10) score += 5;

// Filter
if(q.dp > 2 && q.c > 5 && q.c < 200){
results.push({
ticker: WATCHLIST[i],
price: q.c,
change: q.dp,
score: score
});
}

}catch{}
}

return results.sort((a,b)=>b.score-a.score).slice(0,6);
}

// ── Claude Analyse ─────────────────────────
async function analyze(data){

const res = await fetch("https://api.anthropic.com/v1/messages",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-api-key":CLAUDE,
"anthropic-version":"2023-06-01"
},
body:JSON.stringify({
model:"claude-3-sonnet-20240229",
max_tokens:800,
messages:[{
role:"user",
content:`
3-Tage Trades.

Daten:
${JSON.stringify(data)}

Regeln:
- konkrete Trades
- realistische Ziele
- Hebel 1-5

Antwort JSON:
{
"tipps":[
{"ticker":"","name":"","startkurs":0,"zielkurs":0,"bewegungProzent":0,"setup":"LONG","hebel":0,"grund":""}
]
}`
}]
})
});

let json = await res.json();
return JSON.parse(json.content[0].text);
}

// ── Render ─────────────────────────
function render(tipps, eur){

const out = document.getElementById("output");
out.innerHTML=""

tipps.forEach(t=>{

let startEUR = (t.startkurs * eur).toFixed(2);
let zielEUR = (t.zielkurs * eur).toFixed(2);

let div = document.createElement("div");
div.className="card"

div.innerHTML=`
<b>${t.ticker}</b><br><br>

Setup: <b>${t.setup}</b> (${t.hebel}x)<br>

Start: ${startEUR} €<br>
Ziel (3 Tage): ${zielEUR} €<br>
Bewegung: ${t.bewegungProzent}%<br><br>

<i>${t.grund}</i>
`;

out.appendChild(div);

});
}

// ── Main ─────────────────────────
async function startScan(){

let btn = document.getElementById("scanBtn");
let text = document.getElementById("btnText");
let icon = document.getElementById("btnIcon");

btn.disabled=true;
text.innerText="Analysiere..."
icon.innerHTML='<span class="spinner"></span>';

document.getElementById("status").innerText="Hole EUR Kurs..."

try{

let eur = await getEURRate();

document.getElementById("status").innerText="Scanne Markt..."

let pre = await prefilter();

document.getElementById("status").innerText="KI analysiert..."

let result = await analyze(pre);

// Hebel begrenzen
result.tipps = result.tipps.map(t=>{
if(t.hebel > 5) t.hebel = 5;
if(t.hebel < 1) t.hebel = 1;
return t;
});

render(result.tipps, eur);

document.getElementById("status").innerText="Fertig"

}catch(e){
document.getElementById("status").innerText="Fehler: "+e.message;
}

btn.disabled=false;
text.innerText="Scan starten"
icon.innerText="→"
document.getElementById("progress").innerText=""
}

</script>
</body>
</html>

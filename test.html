<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pace v1.1</title>

<style>
body {
font-family: -apple-system, sans-serif;
background: #f2f2f7;
text-align: center;
margin: 0;
padding: 20px;
}

.card {
background: white;
border-radius: 16px;
padding: 20px;
margin: 20px auto;
max-width: 400px;
box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.button {
display: block;
width: 100%;
padding: 15px;
margin: 10px 0;
border-radius: 12px;
border: none;
font-size: 18px;
font-weight: bold;
}

.sub {
font-size: 13px;
opacity: 0.7;
margin-top: 4px;
}

.green { background: #34c759; color: white; }
.yellow { background: #ffcc00; }
.orange { background: #ff9500; color: white; }
.red { background: #ff3b30; color: white; }
.gray { background: #e5e5ea; }

.status {
font-size: 22px;
margin-top: 10px;
font-weight: bold;
}

.log {
text-align: left;
font-size: 14px;
max-height: 200px;
overflow-y: auto;
}

.log-entry {
padding: 5px 0;
border-bottom: 1px solid #eee;
}

.hidden { display: none; }
</style>
</head>

<body>

<h1>Pace</h1>

<div id="startScreen" class="card">
<h2>Wie hast du geschlafen?</h2>
<button class="button green" onclick="startDay(100)">🟢 Gut geschlafen</button>
<button class="button yellow" onclick="startDay(80)">🟡 So lala</button>
<button class="button red" onclick="startDay(60)">🔴 Schlecht geschlafen</button>
</div>

<div id="app" class="hidden">

<div class="card">
<h2>Energie heute</h2>
<div id="energy" style="font-size:40px;">100%</div>
<div id="statusText" class="status">Alles ok</div>
</div>

<div class="card">
<button class="button green" onclick="addLoad(2,'Kurze Belastung')">
🟢 Kurze Belastung
<div class="sub">Puls hoch • kurz angestrengt</div>
</button>

<button class="button yellow" onclick="addLoad(10,'Alltag')">
🟡 Alltag
<div class="sub">Haushalt • reden • einkaufen</div>
</button>

<button class="button orange" onclick="addLoad(20,'Kopf an')">
🟠 Kopf an
<div class="sub">denken • planen • Bildschirm</div>
</button>

<button class="button red" onclick="addLoad(30,'Zu viel')">
🔴 Zu viel
<div class="sub">Stress • Druck • überziehen</div>
</button>
</div>

<div class="card">
<button class="button gray" onclick="pause()">Ich mache Pause</button>
<button class="button gray" onclick="undoLast()">Letzten Eintrag löschen</button>
</div>

<div class="card">
<div id="message"></div>
</div>

<div class="card">
<h3>Heute</h3>
<div id="log" class="log"></div>
</div>

</div>

<script>
let energy = 100;
let spentSinceBreak = 0;
let log = [];

function startDay(value) {
energy = value;
spentSinceBreak = 0;
log = [];

document.getElementById("startScreen").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

updateUI();
renderLog();

if (value === 100) showMessage("Du kannst normal planen.");
if (value === 80) showMessage("Heute etwas vorsichtiger.");
if (value === 60) showMessage("Heute nur das Nötigste.");
}

function addLoad(amount, label) {
energy -= amount;
spentSinceBreak += amount;

if (energy < 0) energy = 0;

const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

log.unshift({
time: time,
label: label,
amount: amount
});

updateUI();
renderLog();

if (amount >= 20) {
showMessage("Das war anstrengend. Mach jetzt Pause.");
}

if (spentSinceBreak >= 25) {
showMessage("Du hast gerade viel gemacht. Pause einlegen.");
}

checkLimits();
}

function undoLast() {
if (log.length === 0) return;

const last = log.shift();

energy += last.amount;
spentSinceBreak -= last.amount;

if (energy > 100) energy = 100;
if (spentSinceBreak < 0) spentSinceBreak = 0;

updateUI();
renderLog();

showMessage("Letzter Eintrag entfernt.");
}

function renderLog() {
const logDiv = document.getElementById("log");
logDiv.innerHTML = ""

log.forEach(entry => {
const div = document.createElement("div");
div.className = "log-entry"
div.innerText = `${entry.time} – ${entry.label} (-${entry.amount})`;
logDiv.appendChild(div);
});
}

function pause() {
spentSinceBreak = 0;
showMessage("Erholung läuft.");
}

function updateUI() {
document.getElementById("energy").innerText = energy + "%"

let status = "Alles ok"

if (energy < 60) status = "Langsam machen"
if (energy < 40) status = "Du wirst müde"
if (energy < 30) status = "Stopp. Sonst Crash"
if (energy < 20) status = "Erholung jetzt zwingend"

document.getElementById("statusText").innerText = status;
}

function checkLimits() {
if (energy < 40) showMessage("Du wirst müde. Reduziere jetzt.");
if (energy < 30) showMessage("Stopp. Sonst Crash.");
if (energy < 20) showMessage("Zu spät. Erholung jetzt zwingend.");
}

function showMessage(text) {
document.getElementById("message").innerText = text;
}
</script>

</body>
</html>

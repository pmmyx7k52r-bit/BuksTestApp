<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeinMarkt 1.0</title>

<style>
body {
font-family: -apple-system, sans-serif;
background: #0d1117;
color: #e6edf3;
padding: 20px;
}
button {
padding: 12px;
font-size: 16px;
background: #238636;
color: white;
border: none;
border-radius: 8px;
}
.card {
background: #161b22;
padding: 15px;
margin-top: 15px;
border-radius: 10px;
}
</style>
</head>

<body>

<h2>📊 MeinMarkt 1.0</h2>
<button onclick="start()">Scannen</button>
<div id="output"></div>

<script>
const FINNHUB = "DEIN_FINNHUB_KEY"
const CLAUDE = "DEIN_CLAUDE_KEY"

async function getGainers() {
const res = await fetch(`https://finnhub.io/api/v1/stock/symbol?exchange=US&token=${FINNHUB}`);
const data = await res.json();

return data.slice(0, 20).map(s => s.symbol);
}

async function getQuote(ticker) {
const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB}`);
return await res.json();
}

async function prefilter() {
const tickers = await getGainers();
const results = [];

for (let t of tickers) {
try {
const q = await getQuote(t);
if (q.dp > 2 && q.v > 1000000) {
results.push({
ticker: t,
change: q.dp,
price: q.c
});
}
} catch {}
}

return results.slice(0, 10);
}

async function analyzeWithClaude(data) {
const res = await fetch("https://api.anthropic.com/v1/messages", {
method: "POST",
headers: {
"Content-Type": "application/json",
"x-api-key": CLAUDE,
"anthropic-version": "2023-06-01"
},
body: JSON.stringify({
model: "claude-3-sonnet-20240229",
max_tokens: 800,
messages: [{
role: "user",
content: `Bewerte diese Aktien für 7 Tage Trading:

${JSON.stringify(data)}

Wähle die 3 besten basierend auf Momentum + Wahrscheinlichkeit.

Antwort als JSON:
{
"tipps": [
{"ticker":"", "score":0, "grund":""}
]
}`
}]
})
});

const json = await res.json();
return JSON.parse(json.content[0].text);
}

function render(tipps) {
const out = document.getElementById("output");
out.innerHTML = ""

tipps.forEach(t => {
const div = document.createElement("div");
div.className = "card"
div.innerHTML = `
<b>${t.ticker}</b><br>
Score: ${t.score}<br>
${t.grund}
`;
out.appendChild(div);
});
}

async function start() {
document.getElementById("output").innerHTML = "Lade..."

const pre = await prefilter();
const result = await analyzeWithClaude(pre);

render(result.tipps);
}
</script>

</body>
</html>
